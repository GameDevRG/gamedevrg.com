<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment Tracker</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Inter, Arial, sans-serif;
        }

        body {
            background: #0f1117;
            color: white;
            padding: 24px;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: #171a22;
            border-radius: 18px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .highlight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        .title {
            font-size: 1rem;
            font-weight: 600;
            opacity: 0.9;
        }

        .big-number {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -1px;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            transition: width 0.2s ease;
        }

        .progress-text {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .assignment-input {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .assignment-input label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        input {
            background: #0f1117;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            border-radius: 10px;
            padding: 10px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            border: none;
            border-radius: 12px;
            padding: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s ease;
        }

        button:hover {
            transform: scale(1.03);
        }

        .minus {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .plus {
            color: white;
        }

        .apcsp .highlight,
        .apcsp .progress-bar,
        .apcsp .plus {
            background: #3aa8ff;
        }

        .apush .highlight,
        .apush .progress-bar,
        .apush .plus {
            background: #ff5a7a;
        }

        .math .highlight,
        .math .progress-bar,
        .math .plus {
            background: #37d67a;
        }

        .spanish .highlight,
        .spanish .progress-bar,
        .spanish .plus {
            background: #ffb020;
        }

        .english .highlight,
        .english .progress-bar,
        .english .plus {
            background: #9d6cff;
        }

        @media (max-width: 600px) {
            body {
                padding: 16px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .big-number {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <h1>assignment tracker</h1>

    <div class="container" id="container"></div>

    <script>
        const STORAGE_KEY = 'assignmentTrackerData';

        const classes = [
            { name: 'ap comp sci', className: 'apcsp' },
            { name: 'apush', className: 'apush' },
            { name: 'math', className: 'math' },
            { name: 'spanish', className: 'spanish' },
            { name: 'english', className: 'english' }
        ];

        const container = document.getElementById('container');

        const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY));

        const progressData = savedData || classes.map(() => ({
            done: 0,
            total: 0
        }));

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progressData));
        }

        classes.forEach((subject, index) => {
            const card = document.createElement('div');
            card.className = `card ${subject.className}`;

            card.innerHTML = `
        <div class="highlight"></div>

        <div class="title">${subject.name}</div>

        <div class="big-number" id="count-${index}">0/0</div>

        <div class="progress-container">
          <div class="progress-bar" id="bar-${index}"></div>
        </div>

        <div class="progress-text" id="percent-${index}">0% complete</div>

        <div class="assignment-input">
          <label>total assignments</label>
          <input type="number" min="0" value="${progressData[index].total}" id="total-${index}" />
        </div>

        <div class="controls">
          <button class="minus" onclick="changeCount(${index}, -1)">−</button>
          <button class="plus" onclick="changeCount(${index}, 1)">+</button>
        </div>
      `;

            container.appendChild(card);
        });

        function updateCard(index) {
            const totalInput = document.getElementById(`total-${index}`);
            const total = Math.max(0, parseInt(totalInput.value) || 0);

            progressData[index].total = total;

            if (progressData[index].done > total) {
                progressData[index].done = total;
            }

            const done = progressData[index].done;

            const percent = total === 0
                ? 0
                : Math.round((done / total) * 100);

            document.getElementById(`count-${index}`).textContent = `${done}/${total}`;
            document.getElementById(`bar-${index}`).style.width = `${percent}%`;
            document.getElementById(`percent-${index}`).textContent = `${percent}% complete`;

            saveData();
        }

        function changeCount(index, amount) {
            progressData[index].done += amount;

            if (progressData[index].done < 0) {
                progressData[index].done = 0;
            }

            if (progressData[index].done > progressData[index].total) {
                progressData[index].done = progressData[index].total;
            }

            updateCard(index);
        }

        classes.forEach((_, index) => {
            document
                .getElementById(`total-${index}`)
                .addEventListener('input', () => updateCard(index));

            updateCard(index);
        });
    </script>
</body>

</html>
