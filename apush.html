<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>APUSH Timeline</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		body {
			margin: 0;
			overflow: hidden;
			font-family: Arial;
		}

		#timeline {
			position: relative;
			width: 100vw;
			height: 100vh;
			background: #f5f5f5;
			cursor: grab;
		}

		.axis {
			position: absolute;
			top: 50%;
			width: 100%;
			height: 2px;
			background: black;
		}

		.tick {
			position: absolute;
			width: 1px;
			background: black;
			top: 50%;
		}

		.tick-label {
			position: absolute;
			top: calc(50% + 8px);
			font-size: 10px;
			transform: translateX(-50%);
		}

		.event {
			position: absolute;
			transform: translateX(-50%);
			background: #2c3e50;
			color: white;
			padding: 4px 6px;
			border-radius: 4px;
			font-size: 12px;
			cursor: pointer;
			white-space: nowrap;
		}

		.connector {
			position: absolute;
			width: 2px;
			background: #2c3e50;
		}

		/* popup */
		#popup {
			position: absolute;
			background: white;
			border: 1px solid #ccc;
			padding: 10px;
			border-radius: 6px;
			display: none;
			max-width: 250px;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
			z-index: 10;
		}

		#popup h4 {
			margin: 0 0 5px 0;
		}

		/* floating search bar */
		#search-container {
			position: fixed;
			bottom: 25px;
			/* NOT touching bottom */
			left: 50%;
			transform: translateX(-50%);

			display: flex;
			align-items: center;
			gap: 8px;

			background: rgba(255, 255, 255, 0.85);
			backdrop-filter: blur(10px);

			padding: 8px 10px;
			border-radius: 999px;
			/* MAX rounded */

			box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
			z-index: 20;
		}

		/* input field */
		#search-input {
			border: none;
			outline: none;
			background: transparent;

			padding: 10px 14px;
			font-size: 14px;

			border-radius: 999px;
			width: 200px;
		}

		/* circular button */
		#search-btn {
			width: 40px;
			height: 40px;

			border: none;
			cursor: pointer;

			border-radius: 50%;
			/* perfect circle */
			background: #2c3e50;
			color: white;

			display: flex;
			align-items: center;
			justify-content: center;

			font-size: 16px;

			transition: transform 0.15s, background 0.2s;
		}

		#search-btn:hover {
			background: #1a252f;
			transform: scale(1.1);
		}

		#search-btn i {
			font-size: 16px;
			pointer-events: none;
		}

		/* suggestions container (anchors ABOVE bar) */
		#suggestions {
			position: absolute;
			bottom: 100%;
			/* anchor to top of bar */
			left: 0;
			right: 0;

			display: flex;
			flex-direction: column-reverse;
			/* stack UP */

			gap: 4px;
			margin-bottom: 8px;

			pointer-events: none;
			/* clicks pass through unless enabled */
		}

		/* individual suggestion */
		.suggestion {
			font-size: 13px;
			color: rgba(0, 0, 0, 0.6);

			opacity: 0;
			transform: translateY(10px);

			animation: fadeInUp 0.2s ease forwards;
			pointer-events: auto;
			cursor: pointer;
		}

		/* fade OUT */
		.suggestion.removing {
			animation: fadeOutDown 0.15s ease forwards;
		}

		/* bold match */
		.suggestion b {
			font-weight: bold;
			color: rgba(0, 0, 0, 0.9);
		}

		/* animations */
		@keyframes fadeInUp {
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes fadeOutDown {
			to {
				opacity: 0;
				transform: translateY(10px);
			}
		}
	</style>
</head>

<body>
	<div id="search-container">
		<div id="suggestions"></div>
		<input type="text" id="search-input" placeholder="Search events..." />
		<button id="search-btn">
			<i class="fa-solid fa-magnifying-glass"></i>
		</button>
	</div>

	<div id="timeline">
		<div class="axis"></div>
	</div>

	<div id="popup"></div>

	<script>
		let events = [];
		let scale = 5;
		let offsetX = 0;

		const container = document.getElementById("timeline");
		const popup = document.getElementById("popup");

		async function loadData() {
			const res = await fetch("events.json");
			events = await res.json();
			render();
		}

		function getVisiblePriority() {
			if (scale < 2) return 1;
			if (scale < 8) return 2;
			return 3;
		}

		function yearToX(year) {
			return (year * scale) + offsetX + window.innerWidth / 2;
		}

		function xToYear(x) {
			return (x - window.innerWidth / 2 - offsetX) / scale;
		}

		function getTickStep() {
			if (scale < 1) return 100;
			if (scale < 3) return 50;
			if (scale < 8) return 10;
			return 1;
		}

		function render() {
			document.querySelectorAll(".event, .tick, .tick-label, .connector").forEach(e => e.remove());

			const maxPriority = getVisiblePriority();
			const step = getTickStep();

			const startYear = Math.floor(xToYear(0));
			const endYear = Math.ceil(xToYear(window.innerWidth));

			// ticks
			for (let y = startYear - (startYear % step); y <= endYear; y += step) {
				const x = yearToX(y);

				const tick = document.createElement("div");
				tick.className = "tick";
				tick.style.left = x + "px";
				tick.style.height = (y % (step * 5) === 0) ? "20px" : "10px";

				const label = document.createElement("div");
				label.className = "tick-label";
				label.style.left = x + "px";
				label.textContent = y;

				container.appendChild(tick);
				container.appendChild(label);
			}

			// 🧠 STACKING SYSTEM
			const lanes = {}; // track used vertical slots

			// store placed boxes for collision detection
			const placed = [];

			events.forEach(ev => {
				if (ev.priority > maxPriority) return;

				const x = yearToX(ev.year);

				let yOffset = 60; // starting height
				let placedSuccessfully = false;

				let eventEl;

				while (!placedSuccessfully) {
					// create temp element to measure
					eventEl = document.createElement("div");
					eventEl.className = "event";
					eventEl.style.left = x + "px";
					eventEl.style.top = `calc(50% - ${yOffset}px)`;
					eventEl.textContent = ev.title;

					container.appendChild(eventEl);

					const rect = eventEl.getBoundingClientRect();

					// check collision
					let collision = false;
					for (let p of placed) {
						if (
							rect.left < p.right &&
							rect.right > p.left &&
							rect.top < p.bottom &&
							rect.bottom > p.top
						) {
							collision = true;
							break;
						}
					}

					if (collision) {
						container.removeChild(eventEl);
						yOffset += 35; // move higher and retry
					} else {
						placed.push(rect);
						placedSuccessfully = true;
					}
				}

				// connector line
				const line = document.createElement("div");
				line.className = "connector";
				line.style.left = x + "px";
				line.style.top = `calc(50% - ${yOffset - 5}px)`;
				line.style.height = (yOffset - 5) + "px";

				// popup
				eventEl.onclick = (e) => {
					popup.style.display = "block";
					popup.style.left = (e.clientX + 10) + "px";
					popup.style.top = (e.clientY + 10) + "px";

					popup.innerHTML = `
      <h4>${ev.title}</h4>
      <p>${ev.description}</p>
      <small>${ev.year}</small>
    `;
				};

				container.appendChild(line);
			});
		}


		// 🎯 ZOOM TO CURSOR
		container.addEventListener("wheel", (e) => {
			e.preventDefault();

			const mouseX = e.clientX;
			const before = xToYear(mouseX);

			const zoomFactor = 1.1;
			scale = e.deltaY > 0 ? scale / zoomFactor : scale * zoomFactor;
			scale = Math.max(0.5, Math.min(scale, 50));

			const after = xToYear(mouseX);
			offsetX += (after - before) * scale;

			render();
		});


		// 🖱️ PAN
		let dragging = false;
		let lastX = 0;

		container.addEventListener("mousedown", (e) => {
			dragging = true;
			lastX = e.clientX;
			container.style.cursor = "grabbing";
		});

		window.addEventListener("mouseup", () => {
			dragging = false;
			container.style.cursor = "grab";
		});

		window.addEventListener("mousemove", (e) => {
			if (!dragging) return;

			const dx = e.clientX - lastX;
			lastX = e.clientX;

			offsetX += dx;
			render();
		});


		// ❌ close popup on click outside
		window.addEventListener("click", (e) => {
			if (!e.target.classList.contains("event")) {
				popup.style.display = "none";
			}
		});

		loadData();

		const searchInput = document.getElementById("search-input");

		searchInput.addEventListener("input", () => {
			const query = searchInput.value.toLowerCase();

			document.querySelectorAll(".event").forEach(el => {
				const text = el.textContent.toLowerCase();
				el.style.display = text.includes(query) ? "block" : "none";
			});
		});

		const suggestionsEl = document.getElementById("suggestions");
		const inputEl = document.getElementById("search-input");

		function highlightMatch(text, query) {
			const i = text.toLowerCase().indexOf(query.toLowerCase());
			if (i === -1) return text;

			return (
				text.slice(0, i) +
				"<b>" +
				text.slice(i, i + query.length) +
				"</b>" +
				text.slice(i + query.length)
			);
		}

		let hasTyped = false;

		function updateSuggestions() {
			const query = inputEl.value.trim();

			// detect first character typed
			const isFirstChar = query.length === 1 && !hasTyped;
			if (query.length === 0) hasTyped = false;
			else hasTyped = true;

			// clear existing suggestions
			suggestionsEl.innerHTML = "";

			if (!query) return;

			const matches = events
				.filter(ev => ev.title.toLowerCase().includes(query.toLowerCase()))
				.slice(0, 5);

			matches.forEach(ev => {
				const div = document.createElement("div");
				div.className = "suggestion";

				// ONLY animate on first character
				if (!isFirstChar) {
					div.style.animation = "none";
					div.style.opacity = "1";
					div.style.transform = "translateY(0)";
				}

				div.innerHTML = highlightMatch(ev.title, query);

				div.onclick = () => {
					inputEl.value = ev.title;
					suggestionsEl.innerHTML = "";

					offsetX = -ev.year * scale;
					render();
				};

				suggestionsEl.appendChild(div);
			});
		}
		inputEl.addEventListener("input", updateSuggestions);
	</script>



</body>

</html>
