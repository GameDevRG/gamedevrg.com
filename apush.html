<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>APUSH Timeline</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

	<style>
		body {
			margin: 0;
			overflow: hidden;
			font-family: Arial;
		}

		#timeline {
			position: relative;
			width: 100vw;
			height: 100vh;
			background: #f5f5f5;
			cursor: grab;
		}

		.axis {
			position: absolute;
			top: 50%;
			width: 100%;
			height: 2px;
			background: black;
		}

		.tick {
			position: absolute;
			width: 1px;
			background: black;
			top: 50%;
		}

		.tick-label {
			position: absolute;
			top: calc(50% + 8px);
			font-size: 10px;
			transform: translateX(-50%);
		}

		.event {
			position: absolute;
			transform: translateX(-50%);
			background: #2c3e50;
			color: white;
			padding: 4px 6px;
			border-radius: 4px;
			font-size: 12px;
			cursor: pointer;
			white-space: nowrap;
		}

		.connector {
			position: absolute;
			width: 2px;
			background: #2c3e50;
		}

		/* popup */
		#popup {
			position: absolute;
			background: white;
			border: 1px solid #ccc;
			padding: 10px;
			border-radius: 6px;
			display: none;
			max-width: 250px;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
			z-index: 10;
		}

		#popup h4 {
			margin: 0 0 5px 0;
		}

		/* floating search bar */
		#search-container {
			position: fixed;
			bottom: 25px;
			/* NOT touching bottom */
			left: 50%;
			transform: translateX(-50%);

			display: flex;
			align-items: center;
			gap: 8px;

			background: rgba(255, 255, 255, 0.85);
			backdrop-filter: blur(10px);

			padding: 8px 10px;
			border-radius: 999px;
			/* MAX rounded */

			box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
			z-index: 20;
		}

		/* input field */
		#search-input {
			border: none;
			outline: none;
			background: transparent;

			padding: 10px 14px;
			font-size: 14px;

			border-radius: 999px;
			width: 200px;
		}

		/* circular button */
		#search-btn {
			width: 40px;
			height: 40px;

			border: none;
			cursor: pointer;

			border-radius: 50%;
			/* perfect circle */
			background: #2c3e50;
			color: white;

			display: flex;
			align-items: center;
			justify-content: center;

			font-size: 16px;

			transition: transform 0.15s, background 0.2s;
		}

		#search-btn:hover {
			background: #1a252f;
			transform: scale(1.1);
		}

		#search-btn i {
			font-size: 16px;
			pointer-events: none;
		}

		/* suggestions container (anchors ABOVE bar) */
		#suggestions {
			position: absolute;
			bottom: 100%;
			/* anchor to top of bar */
			left: 0;
			right: 0;

			display: flex;
			flex-direction: column-reverse;
			/* stack UP */

			gap: 4px;
			margin-bottom: 8px;

			pointer-events: none;
			/* clicks pass through unless enabled */
		}

		/* individual suggestion */
		.suggestion {
			font-size: 13px;
			color: rgba(0, 0, 0, 0.6);

			opacity: 0;
			transform: translateY(10px);

			animation: fadeInUp 0.2s ease forwards;
			pointer-events: auto;
			cursor: pointer;
		}

		/* fade OUT */
		.suggestion.removing {
			animation: fadeOutDown 0.15s ease forwards;
		}

		/* bold match */
		.suggestion b {
			font-weight: bold;
			color: rgba(0, 0, 0, 0.9);
		}

		/* animations */
		@keyframes fadeInUp {
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes fadeOutDown {
			to {
				opacity: 0;
				transform: translateY(10px);
			}
		}

		.period-layer {
			position: absolute;
			top: calc(50% - 10px);
			/* 10px above axis */
			height: 10px;
			width: 100%;
			pointer-events: none;
		}

		/* sharp solid bars */
		.period-segment {
			position: absolute;
			height: 100%;
			border-radius: 0;
			/* hard edges */

			opacity: 1;
		}

		.period-label {
			position: absolute;
			top: calc(50% - 28px);

			font-size: 10px;
			font-weight: bold;

			transform: translateX(-50%);

			opacity: 0.8;
			white-space: nowrap;

			text-shadow: 0 0 0 white;
			/* keeps readability without glow */
		}

		#overlay {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0);
			
			display: none;
			z-index: 50;
		}

		#sidebar {
			position: fixed;
			top: 0;
			left: -420px;
			width: 400px;
			height: 100vh;
			background: rgba(20, 20, 20, 0.75);
			color: white;
			padding: 20px;
			transition: left 0.3s ease;
			z-index: 60;
			overflow-y: auto;
			backdrop-filter: blur(10px);
		}

		#sidebar img {
			width: 100%;
			border-radius: 8px;
			margin: 10px 0;
		}

		#sidebar small {
			opacity: 0.7;
		}

		#more-info-btn {
			margin-top: 10px;
			padding: 8px 10px;
			border: none;
			cursor: pointer;
			border-radius: 6px;
		}
	</style>
</head>

<body>
	<div id="search-container">
		<div id="suggestions"></div>
		<input type="text" id="search-input" placeholder="Search events..." />
		<button id="search-btn">
			<i class="fa-solid fa-magnifying-glass"></i>
		</button>
	</div>

	<div id="timeline">
		<div class="axis"></div>
	</div>

	<div id="popup"></div>

	<div id="sidebar">
		<div id="sidebar-content"></div>
	</div>

	<div id="overlay"></div>

	<script>
		let events = [];
		let scale = 5;
		let offsetX = 0;

		const container = document.getElementById("timeline");
		const popup = document.getElementById("popup");

		let infoData = [];

		async function loadInfo() {
			const res = await fetch("info.json");
			infoData = await res.json();
		}
		async function loadData() {
			const res = await fetch("events.json");
			events = await res.json();
			render();
		}

		function getVisiblePriority() {
			if (scale < 2) return 1;
			if (scale < 8) return 2;
			return 3;
		}

		function yearToX(year) {
			return (year * scale) + offsetX + window.innerWidth / 2;
		}

		function xToYear(x) {
			return (x - window.innerWidth / 2 - offsetX) / scale;
		}

		function getTickStep() {
			if (scale < 1) return 100;
			if (scale < 3) return 50;
			if (scale < 8) return 10;
			return 1;
		}

		function render() {
			document.querySelectorAll(".event, .tick, .tick-label, .connector").forEach(e => e.remove());

			const maxPriority = getVisiblePriority();
			const step = getTickStep();

			const startYear = Math.floor(xToYear(0));
			const endYear = Math.ceil(xToYear(window.innerWidth));

			// remove old
			document.querySelectorAll(".period-layer, .period-label").forEach(e => e.remove());

			// create layer
			const layer = document.createElement("div");
			layer.className = "period-layer";
			container.appendChild(layer);

			// render each period
			periods.forEach(p => {
				const startX = yearToX(p.start);
				const endX = yearToX(p.end);
				const width = endX - startX;

				// segment
				const seg = document.createElement("div");
				seg.className = "period-segment";
				seg.style.left = startX + "px";
				seg.style.width = width + "px";
				seg.style.background = p.color;

				layer.appendChild(seg);

				// label
				const label = document.createElement("div");
				label.className = "period-label";
				label.style.left = (startX + width / 2) + "px";
				label.style.color = p.color;
				label.textContent = p.name;

				container.appendChild(label);
			});

			// ticks
			for (let y = startYear - (startYear % step); y <= endYear; y += step) {
				const x = yearToX(y);

				const tick = document.createElement("div");
				tick.className = "tick";
				tick.style.left = x + "px";
				tick.style.height = (y % (step * 5) === 0) ? "20px" : "10px";

				const label = document.createElement("div");
				label.className = "tick-label";
				label.style.left = x + "px";
				label.textContent = y;

				container.appendChild(tick);
				container.appendChild(label);
			}

			// 🧠 STACKING SYSTEM
			const lanes = {}; // track used vertical slots

			// store placed boxes for collision detection
			const placed = [];

			events.forEach(ev => {
				if (ev.priority > maxPriority) return;

				const x = yearToX(ev.year);

				let yOffset = 60; // starting height
				let placedSuccessfully = false;

				let eventEl;

				while (!placedSuccessfully) {
					// create temp element to measure
					eventEl = document.createElement("div");
					eventEl.className = "event";
					eventEl.style.left = x + "px";
					eventEl.style.top = `calc(50% - ${yOffset}px)`;
					if (ev.keyEvent) {
						eventEl.style.background = "#22c55e"; // green
						eventEl.textContent = "★ " + ev.title;
					} else {
						eventEl.textContent = ev.title;
					}

					container.appendChild(eventEl);

					const rect = eventEl.getBoundingClientRect();

					// check collision
					let collision = false;
					for (let p of placed) {
						if (
							rect.left < p.right &&
							rect.right > p.left &&
							rect.top < p.bottom &&
							rect.bottom > p.top
						) {
							collision = true;
							break;
						}
					}

					if (collision) {
						container.removeChild(eventEl);
						yOffset += 35; // move higher and retry
					} else {
						placed.push(rect);
						placedSuccessfully = true;
					}
				}

				// connector line
				const line = document.createElement("div");
				line.className = "connector";
				line.style.left = x + "px";
				line.style.top = `calc(50% - ${yOffset - 5}px)`;
				line.style.height = (yOffset - 5) + "px";

				// popup
				eventEl.onclick = (e) => {
					const info = infoData.find(i => i.name === ev.title);

					popup.style.display = "block";
					popup.style.left = (e.clientX + 10) + "px";
					popup.style.top = (e.clientY + 10) + "px";

					popup.innerHTML = `
    <h4>${ev.title}</h4>
    <p>${ev.description}</p>
    <small>${ev.year}</small>
    ${ev.keyEvent ? `<button id="more-info-btn">More Info</button>` : ""}
  `;

					if (ev.keyEvent) {
						setTimeout(() => {
							document.getElementById("more-info-btn").onclick = () => {
								openSidebar(info || ev);
							};
						}, 0);
					}
				};

				container.appendChild(line);
			});
		}


		// 🎯 ZOOM TO CURSOR
		container.addEventListener("wheel", (e) => {
			e.preventDefault();

			const mouseX = e.clientX;
			const before = xToYear(mouseX);

			const zoomFactor = 1.1;
			scale = e.deltaY > 0 ? scale / zoomFactor : scale * zoomFactor;
			scale = Math.max(0.5, Math.min(scale, 50));

			const after = xToYear(mouseX);
			offsetX += (after - before) * scale;

			render();
		});


		// 🖱️ PAN
		let dragging = false;
		let lastX = 0;

		container.addEventListener("mousedown", (e) => {
			dragging = true;
			lastX = e.clientX;
			container.style.cursor = "grabbing";
		});

		window.addEventListener("mouseup", () => {
			dragging = false;
			container.style.cursor = "grab";
		});

		window.addEventListener("mousemove", (e) => {
			if (!dragging) return;

			const dx = e.clientX - lastX;
			lastX = e.clientX;

			offsetX += dx;
			render();
		});


		// ❌ close popup on click outside
		window.addEventListener("click", (e) => {
			if (!e.target.classList.contains("event")) {
				popup.style.display = "none";
			}
		});

		loadData();

		const searchInput = document.getElementById("search-input");

		searchInput.addEventListener("input", () => {
			const query = searchInput.value.toLowerCase();

			document.querySelectorAll(".event").forEach(el => {
				const text = el.textContent.toLowerCase();
				el.style.display = text.includes(query) ? "block" : "none";
			});
		});

		const suggestionsEl = document.getElementById("suggestions");
		const inputEl = document.getElementById("search-input");

		function highlightMatch(text, query) {
			const i = text.toLowerCase().indexOf(query.toLowerCase());
			if (i === -1) return text;

			return (
				text.slice(0, i) +
				"<b>" +
				text.slice(i, i + query.length) +
				"</b>" +
				text.slice(i + query.length)
			);
		}

		let hasTyped = false;

		function updateSuggestions() {
			const query = inputEl.value.trim();

			// detect first character typed
			const isFirstChar = query.length === 1 && !hasTyped;
			if (query.length === 0) hasTyped = false;
			else hasTyped = true;

			// clear existing suggestions
			suggestionsEl.innerHTML = "";

			if (!query) return;

			const matches = events
				.filter(ev => ev.title.toLowerCase().includes(query.toLowerCase()))
				.slice(0, 5);

			matches.forEach(ev => {
				const div = document.createElement("div");
				div.className = "suggestion";

				// ONLY animate on first character
				if (!isFirstChar) {
					div.style.animation = "none";
					div.style.opacity = "1";
					div.style.transform = "translateY(0)";
				}

				div.innerHTML = highlightMatch(ev.title, query);

				div.onclick = () => {
					inputEl.value = ev.title;
					suggestionsEl.innerHTML = "";

					offsetX = -ev.year * scale;
					render();
				};

				suggestionsEl.appendChild(div);
			});
		}
		inputEl.addEventListener("input", updateSuggestions);

		const periods = [
			{ name: "PERIOD 1", start: 1491, end: 1607, color: "rgba(167, 139, 250, 0.25)" }, // purple
			{ name: "PERIOD 2", start: 1607, end: 1754, color: "rgba(96, 165, 250, 0.25)" },  // blue
			{ name: "PERIOD 3", start: 1754, end: 1800, color: "rgba(52, 211, 153, 0.25)" },  // green
			{ name: "PERIOD 4", start: 1800, end: 1848, color: "rgba(251, 191, 36, 0.25)" },  // yellow
			{ name: "PERIOD 5", start: 1844, end: 1877, color: "rgba(248, 113, 113, 0.25)" }, // red
			{ name: "PERIOD 6", start: 1865, end: 1898, color: "rgba(251, 146, 60, 0.25)" },  // orange
			{ name: "PERIOD 7", start: 1890, end: 1945, color: "rgba(250, 204, 21, 0.25)" },  // gold
			{ name: "PERIOD 8", start: 1945, end: 1980, color: "rgba(56, 189, 248, 0.25)" },  // sky blue
			{ name: "PERIOD 9", start: 1980, end: 2020, color: "rgba(129, 140, 248, 0.25)" }  // indigo
		];

		const sidebar = document.getElementById("sidebar");
		const overlay = document.getElementById("overlay");
		const sidebarContent = document.getElementById("sidebar-content");

		function openSidebar(data) {
			sidebar.style.left = "0";
			overlay.style.display = "block";

			sidebarContent.innerHTML = `
    <h2>${data.name}</h2>
    <small>${data.dates}</small>
    <img src="${data.image}" />
    <p>${data.text}</p>
  `;
		}

		function closeSidebar() {
			sidebar.style.left = "-420px";
			overlay.style.display = "none";
		}

		overlay.onclick = closeSidebar;
	</script>



</body>

</html>
