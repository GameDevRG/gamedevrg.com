<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APUSH Timeline</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
  }

  #timeline {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #f5f5f5;
    cursor: grab;
  }

  .axis {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 2px;
    background: black;
  }

  .tick {
    position: absolute;
    width: 1px;
    background: black;
    top: 50%;
  }

  .tick-label {
    position: absolute;
    top: calc(50% + 8px);
    font-size: 10px;
    transform: translateX(-50%);
  }

  .event {
    position: absolute;
    transform: translateX(-50%);
    background: #2c3e50;
    color: white;
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  .connector {
    position: absolute;
    width: 2px;
    background: #2c3e50;
  }

  /* popup */
  #popup {
    position: absolute;
    background: white;
    border: 1px solid #ccc;
    padding: 10px;
    border-radius: 6px;
    display: none;
    max-width: 250px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    z-index: 10;
  }

  #popup h4 {
    margin: 0 0 5px 0;
  }
</style>
</head>
<body>

<div id="timeline">
  <div class="axis"></div>
</div>

<div id="popup"></div>

<script>
let events = [];
let scale = 5;
let offsetX = 0;

const container = document.getElementById("timeline");
const popup = document.getElementById("popup");

async function loadData() {
  const res = await fetch("events.json");
  events = await res.json();
  render();
}

function getVisiblePriority() {
  if (scale < 2) return 1;
  if (scale < 8) return 2;
  return 3;
}

function yearToX(year) {
  return (year * scale) + offsetX + window.innerWidth / 2;
}

function xToYear(x) {
  return (x - window.innerWidth / 2 - offsetX) / scale;
}

function getTickStep() {
  if (scale < 1) return 100;
  if (scale < 3) return 50;
  if (scale < 8) return 10;
  return 1;
}

function render() {
  document.querySelectorAll(".event, .tick, .tick-label, .connector").forEach(e => e.remove());

  const maxPriority = getVisiblePriority();
  const step = getTickStep();

  const startYear = Math.floor(xToYear(0));
  const endYear = Math.ceil(xToYear(window.innerWidth));

  // ticks
  for (let y = startYear - (startYear % step); y <= endYear; y += step) {
    const x = yearToX(y);

    const tick = document.createElement("div");
    tick.className = "tick";
    tick.style.left = x + "px";
    tick.style.height = (y % (step * 5) === 0) ? "20px" : "10px";

    const label = document.createElement("div");
    label.className = "tick-label";
    label.style.left = x + "px";
    label.textContent = y;

    container.appendChild(tick);
    container.appendChild(label);
  }

  // 🧠 STACKING SYSTEM
  const lanes = {}; // track used vertical slots

  events.forEach(ev => {
    if (ev.priority > maxPriority) return;

    const x = Math.round(yearToX(ev.year));

    if (!lanes[x]) lanes[x] = 0;

    const lane = lanes[x]++;
    const yOffset = 60 + lane * 30; // stack height

    const eventEl = document.createElement("div");
    eventEl.className = "event";
    eventEl.style.left = x + "px";
    eventEl.style.top = `calc(50% - ${yOffset}px)`;
    eventEl.textContent = ev.title;

    // connector line
    const line = document.createElement("div");
    line.className = "connector";
    line.style.left = x + "px";
    line.style.top = `calc(50% - ${yOffset - 5}px)`;
    line.style.height = (yOffset - 5) + "px";

    // 📦 popup click
    eventEl.onclick = (e) => {
      popup.style.display = "block";
      popup.style.left = (e.clientX + 10) + "px";
      popup.style.top = (e.clientY + 10) + "px";

      popup.innerHTML = `
        <h4>${ev.title}</h4>
        <p>${ev.description}</p>
        <small>${ev.year}</small>
      `;
    };

    container.appendChild(line);
    container.appendChild(eventEl);
  });
}


// 🎯 ZOOM TO CURSOR
container.addEventListener("wheel", (e) => {
  e.preventDefault();

  const mouseX = e.clientX;
  const before = xToYear(mouseX);

  const zoomFactor = 1.1;
  scale = e.deltaY > 0 ? scale / zoomFactor : scale * zoomFactor;
  scale = Math.max(0.5, Math.min(scale, 50));

  const after = xToYear(mouseX);
  offsetX += (after - before) * scale;

  render();
});


// 🖱️ PAN
let dragging = false;
let lastX = 0;

container.addEventListener("mousedown", (e) => {
  dragging = true;
  lastX = e.clientX;
  container.style.cursor = "grabbing";
});

window.addEventListener("mouseup", () => {
  dragging = false;
  container.style.cursor = "grab";
});

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const dx = e.clientX - lastX;
  lastX = e.clientX;

  offsetX += dx;
  render();
});


// ❌ close popup on click outside
window.addEventListener("click", (e) => {
  if (!e.target.classList.contains("event")) {
    popup.style.display = "none";
  }
});

loadData();
</script>

</body>
</html>
