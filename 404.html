<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Not Found</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        background: #0f172a;
        color: white;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* [top bar div] */
    .topbar {
        width: 100%;
        height: 50px;
        background: #1e293b;
    }

    .container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
    }

    /* [Image] */
    .image {
        width: 220px;
        height: auto;
        margin-bottom: 20px;
    }

    /* big text */
    .main-text {
        font-size: 64px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .subtext {
        font-size: 18px;
        margin-bottom: 20px;
        line-height: 1.5;
    }

    .error {
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.7;
        letter-spacing: 2px;
    }

    /* search */
    .search-container {
        margin-top: 30px;
        display: flex;
        gap: 10px;
    }

    .search-container input {
        padding: 12px 16px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        outline: none;
        width: 240px;
    }

    .search-container button {
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
    }

    .search-container button:hover {
        background: #2563eb;
    }

    /* corner credit */
    .credit {
        position: fixed;
        bottom: 10px;
        right: 10px;
        font-size: 12px;
        opacity: 0.6;
    }
</style>
</head>

<body>

<div class="topbar"></div>

<div class="container">
    <!-- [Image] -->
    <img src="your-image.png" alt="404 image" class="image">

    <!-- え…？ <-- big text -->
    <div class="main-text">え…？</div>

    <div class="subtext">
        the webpage you’re looking for doesn’t exist!<br>
        sorry!
    </div>

    <div class="error">ERROR 404</div>

    <div class="search-container">
        <input type="text" placeholder="SEARCH">
        <button>GO!</button>
    </div>
</div>

<div class="credit">
    Image credit: KAITO, © Crypton Future Media, Inc. 2006
</div>

</body>
</html>
