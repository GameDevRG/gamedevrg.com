<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>gamedevrg.com</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
		rel="stylesheet">
	<style>
		body {
			margin: 0;
			overflow: hidden;
			background: #3b82f6;
			font-family: "Chakra Petch", sans-serif;
		}

		canvas {
			font-family: "Chakra Petch", sans-serif;
			font-weight: 600;
			cursor: grab;
			position: fixed;
			z-index: 1;
		}

		canvas:active {
			cursor: grabbing;
		}

		#settingsOverlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background: rgba(15, 23, 42, 0.5);

			display: none;
			justify-content: center;
			align-items: center;
			z-index: 1000;
		}

		#settingsBox {
			background: linear-gradient(145deg, #1e293b77, #33415577);

			border-radius: 0px;
			padding: 40px;
			max-width: 500px;
			width: 90%;
			max-height: 80vh;
			overflow-y: auto;
			box-shadow:
				0 25px 50px -12px rgba(0, 0, 0, 0.7),
				0 0 0 1px rgba(255, 255, 255, 0.1),
				inset 0 1px 0 rgba(255, 255, 255, 0.1);
			border: 1px solid rgba(255, 255, 255, 0.1);
			backdrop-filter: blur(10px);
		}

		.settings-header {
			text-align: center;
			margin-bottom: 30px;
		}

		.settings-title {
			font-size: 28px;
			font-weight: 700;
			background: #3b82f6;
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			margin: 0;
		}

		.settings-section {
			margin-bottom: 25px;
			padding-bottom: 20px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
		}

		.settings-section:last-child {
			border-bottom: none;
			margin-bottom: 0;
		}

		.setting-item {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 15px;
		}

		.setting-item:last-child {
			margin-bottom: 0;
		}

		.setting-label {
			font-weight: 500;
			color: #e2e8f0;
		}

		.toggle-switch {
			position: relative;
			width: 50px;
			height: 26px;
			background: #475569;
			border-radius: 13px;
			cursor: pointer;
			transition: all 0.3s ease;
		}

		.toggle-switch.active {
			background: #3b82f6;
		}

		.toggle-knob {
			position: absolute;
			top: 2px;
			left: 2px;
			width: 22px;
			height: 22px;
			background: white;
			border-radius: 50%;
			transition: all 0.3s ease;
		}

		.toggle-switch.active .toggle-knob {
			transform: translateX(24px);
		}

		.slider-container {
			flex: 1;
			margin-left: 20px;
		}

		.slider {
			width: 100%;
			height: 6px;
			border-radius: 3px;
			background: #ffffff60;
			outline: none;
			-webkit-appearance: none;
			cursor: pointer;
		}

		.slider::-webkit-slider-thumb {
			-webkit-appearance: none;
			appearance: none;
			width: 20px;
			height: 20px;
			border-radius: 50%;
			background: #3b82f6;
			cursor: pointer;
		}

		.slider-value {
			font-size: 14px;
			color: #94a3b8;
			margin-top: 5px;
		}

		.close-btn {
			position: absolute;
			top: 20px;
			right: 20px;
			background: rgba(239, 68, 68, 0.2);
			border: 1px solid rgba(239, 68, 68, 0.4);
			color: #f87171;
			border-radius: 0px;
			padding: 8px 16px;
			cursor: pointer;
			font-weight: 600;
			transition: all 0.3s ease;
		}

		.close-btn:hover {
			background: rgba(239, 68, 68, 0.3);
			color: #fca5a5;
			transform: scale(1.05);
		}

		.dropdown-container {
			margin-left: 20px;
			flex: 1;
			display: flex;
			justify-content: flex-end;
		}

		.dropdown {
			width: 140px;
			padding: 8px 12px;

			background: rgba(255, 255, 255, 0.08);
			color: #e2e8f0;

			border: 1px solid rgba(255, 255, 255, 0.15);
			border-radius: 0px;

			font-family: "Chakra Petch", sans-serif;
			font-size: 14px;

			outline: none;
			cursor: pointer;

			appearance: none;
			-webkit-appearance: none;
			-moz-appearance: none;

			transition: all 0.2s ease;
		}

		.dropdown-container {
			position: relative;
		}

		.dropdown {
			padding-right: 35px;
		}

		.dropdown-container::after {
			content: "▾";
			position: absolute;
			right: 12px;
			top: 50%;
			transform: translateY(-50%);
			color: #94a3b8;
			pointer-events: none;
			font-size: 14px;
		}

		.dropdown option {
			background: #1e293b;
			color: #e2e8f0;
		}

		#topBar {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 60px;
			background: rgba(0, 0, 0, 0.85);
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 0 72px;
			z-index: 9999;
		}

		#searchBox {
			font-family: "Chakra Petch", sans-serif;
			flex: 1;
			padding: 6px 10px;
			border-radius: 0px;
			background: #111;
			border: 2px solid #3b82f6;
			outline: none;
			color: #ffffff;
		}

		#backgroundText {
			position: absolute;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;

			display: flex;
			flex-direction: column;
			justify-content: center;
			/* vertical center */
			align-items: center;
			/* horizontal center */

			text-align: center;
			z-index: 0;
			pointer-events: none;
		}

		body {
			margin: 0;
			overflow: hidden;
			background: #3b82f6;
			font-family: "Chakra Petch", sans-serif;
		}



		#logo {
			width: 1000px;
			height: auto;
			margin-bottom: 10px;
			opacity: 0.5;
		}

		#welcomeText {
			font-size: 48px;
			font-weight: 400;
			color: #ffffff77;
		}

		.searchWrap {
			position: relative;
			width: 400px;
			/* change this to whatever size you want */
		}

		#searchBox {
			width: 100%;
			padding: 6px 10px;
			background: #111;
			border: 2px solid #3b82f6;
			color: white;
			box-sizing: border-box;
		}

		#searchButton {
			background: #3b82f6;
			border: none;
			color: white;
			padding: 6px 10px;
			font-family: "Chakra Petch", sans-serif;
		}

		#searchResults {
			position: absolute;
			padding: 6px 10px;
			top: 100%;
			/* directly under input */
			left: 0;
			width: 100%;
			/* same width as input */

			background: #000000;
			border: none;
			border-top: none;
			color: white;
			z-index: 9999;
		}

		small {
			font-size: 0.6em;
			color: #ffffff77;
			font-weight: 300;
		}
	</style>
</head>

<body>
	<div id="topBar">
		<p style="color: #ffffff;"><strong>gamedevrg</strong><small>.com</small></p>
		<div class="searchWrap">
			<input id="searchBox" placeholder="you can type things here. (this is the search bar)" />
			<div id="searchResults"></div>
		</div>
		<button id="searchButton" onclick="doSearch()">search</button>
	</div>



	<div id="settingsOverlay">
		<div id="settingsBox">
			<button class="close-btn" onclick="closeSettings()" data-i18n="closeSettings">✕ close</button>
			<div class="settings-header">
				<h1 class="settings-title" data-i18n="settingsTitle">settings</h1>
			</div>

			<div class="settings-section">
				<h3 style="color: #94a3b8; margin: 0 0 15px 0; font-size: 16px;" data-i18n="physics">physics</h3>
				<div class="setting-item">
					<span class="setting-label" data-i18n="gravity">gravity</span>
					<div class="slider-container">
						<input type="range" class="slider" id="gravitySlider" min="0" max="1.5" step="0.1" value="1">
						<div class="slider-value" id="gravityValue">1.0</div>
					</div>
				</div>
				<div class="setting-item">
					<span class="setting-label" data-i18n="bounciness">bounciness</span>
					<div class="slider-container">
						<input type="range" class="slider" id="bounceSlider" min="0" max="1" step="0.1" value="0.5">
						<div class="slider-value" id="bounceValue">0.5</div>
					</div>
				</div>
			</div>

			<div class="settings-section">
				<h3 style="color: #94a3b8; margin: 0 0 15px 0; font-size: 16px;" data-i18n="display">display</h3>
				<div class="setting-item">
					<span class="setting-label" data-i18n="textSize">text size</span>
					<div class="slider-container">
						<input type="range" class="slider" id="glowSlider" min="0" max="2" step="0.1" value="1">
						<div class="slider-value" id="glowValue">1.0</div>
					</div>
				</div>
				<div class="setting-item">
					<span class="setting-label" data-i18n="language">language</span>
					<div class="dropdown-container">
						<select id="languageSelect" class="dropdown">
							<option value="en" data-i18n="langEN">English</option>
							<option value="es" data-i18n="langES">Español</option>
							<option value="ja" data-i18n="langJA">日本語</option>
							<option value="zh" data-i18n="langZH">中文</option>
						</select>
					</div>
				</div>

			</div>

			<div class="settings-section">
				<h3 style="color: #94a3b8; margin: 0 0 15px 0; font-size: 16px;" data-i18n="stuffYou">stuff you probably
					do not need to
					change</h3>
				<div class="setting-item">
					<span class="setting-label" data-i18n="tapSensitivity">tap sensitivity</span>
					<div class="slider-container">
						<input type="range" class="slider" id="tapSlider" min="100" max="400" step="25" value="200">
						<div class="slider-value" id="tapValue">200ms</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div id="backgroundText">
		<img id="logo" src="gamedevrgdotcom logo (1).png" alt="Logo">
		<div id="welcomeText" data-i18n="welcome">welcome to my website</div>
	</div>


	<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
	<script>
		const { Engine, Render, Runner, Bodies, World, Mouse, MouseConstraint, Events, Query } = Matter;

		const engine = Engine.create();
		const world = engine.world;

		let settings = {
			gravity: 1.0,
			bounce: 0.5,
			glow: 1.0,
			tapThreshold: 200
		};

		// LANAUGAES STUFF IG


		const translations = {
			en: { // english
				settingsTitle: "settings",
				physics: "physics",
				display: "display",
				textSize: "text size",
				language: "language",
				tapSensitivity: "tap sensitivity",
				stuffYou: "stuff you probably do not need to change",
				gravity: "gravity",
				bounciness: "bounciness",
				closeSettings: "✕ close",

				langEN: "English",
				langES: "Español (Spanish)",
				langJA: "日本語 (Japanese)",
				langZH: "中文 (Chinese)",

				home_basalt: "Basalt Web Experiments",
				home_creations: "my creations",
				home_music: "my music",
				home_community: "gamedevrg community square",
				home_kaito: "kaito shrine",
				home_news: "news",
				home_resume: "resume",
				home_settings: "settings",
				home_account: "my account",

				welcome: "welcome to my (very) awesome website"
			},
			es: { // spanish
				settingsTitle: "configuración",
				physics: "física",
				display: "pantalla",
				textSize: "tamaño del texto",
				language: "idioma",
				tapSensitivity: "sensibilidad táctil",
				stuffYou: "cosas que probablemente no necesites cambiar",
				gravity: "gravedad",
				bounciness: "rebote",
				closeSettings: "✕ cerrar",

				langEN: "English (Inglés)",
				langES: "Español",
				langJA: "日本語 (Japonés)",
				langZH: "中文 (Chino)",

				home_basalt: "Experimentos Web Basalt",
				home_creations: "mis creaciones",
				home_music: "mi música",
				home_community: "plaza comunitaria gamedevrg",
				home_kaito: "santuario de kaito",
				home_news: "noticias",
				home_resume: "currículum",
				home_settings: "configuración",

				welcome: "bienvenido a mi sitio web (muy) increíble"
			},
			ja: { // japanese
				settingsTitle: "設定",
				physics: "物理",
				display: "表示",
				textSize: "文字サイズ",
				language: "言語",
				tapSensitivity: "タップ感度",
				stuffYou: "たぶん変更する必要のない項目",
				gravity: "重力",
				bounciness: "弾力",
				closeSettings: "✕ 閉じる",

				langEN: "English (英語)",
				langES: "Español (スペイン語)",
				langJA: "日本語",
				langZH: "中文 (中国語)",

				home_basalt: "Basalt Web 実験",
				home_creations: "私の作品",
				home_music: "私の音楽",
				home_community: "gamedevrg コミュニティ広場",
				home_kaito: "カイト神社",
				home_news: "ニュース",
				home_resume: "履歴書",
				home_settings: "設定",

				welcome: "ようこそ、私の（とても）すごいウェブサイトへ"
			},
			zh: { // chinese
				settingsTitle: "设置",
				physics: "物理",
				display: "显示",
				textSize: "文字大小",
				language: "语言",
				tapSensitivity: "触控灵敏度",
				stuffYou: "你大概不需要更改的内容",
				gravity: "重力",
				bounciness: "弹性",
				closeSettings: "✕ 关闭",

				langEN: "English (英语)",
				langES: "Español (西班牙语)",
				langJA: "日本語 (日语)",
				langZH: "中文",

				home_basalt: "Basalt 网页实验",
				home_creations: "我的作品",
				home_music: "我的音乐",
				home_community: "gamedevrg 社区广场",
				home_kaito: "kaito 神社",
				home_news: "新闻",
				home_resume: "简历",
				home_settings: "设置",

				welcome: "欢迎来到我的（非常）很棒的网站"
			},
		};
		function applyLanguage(lang) {
			const elements = document.querySelectorAll("[data-i18n]");

			elements.forEach(el => {
				const key = el.getAttribute("data-i18n");
				if (translations[lang][key]) {
					el.textContent = translations[lang][key];
				}
			});
		}

		const savedLang = localStorage.getItem("lang") || "en";
		applyLanguage(savedLang);
		document.getElementById("languageSelect").value = savedLang;
		document.getElementById("languageSelect").addEventListener("change", (e) => {
			const lang = e.target.value;
			localStorage.setItem("lang", lang);
			applyLanguage(lang);
		});

		function t(key) {
			return translations[savedLang]?.[key] || key;
		}


		// RENDERER SECTION


		const render = Render.create({
			element: document.body,
			engine: engine,
			options: {
				width: window.innerWidth,
				height: window.innerHeight,
				wireframes: false,
				background: 'transparent',
				showAngleIndicator: false,
				showVelocity: false
			}
		});

		Render.run(render);
		const runner = Runner.create();
		Runner.run(runner, engine);

		// Boundaries
		const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight - 30, window.innerWidth, 60, {
			isStatic: true,
			render: { fillStyle: 'rgba(0,0,0,1)' }
		});
		const leftWall = Bodies.rectangle(30, window.innerHeight / 2, 60, window.innerHeight, {
			isStatic: true,
			render: { fillStyle: 'rgba(0,0,0,1)' }
		});
		const rightWall = Bodies.rectangle(window.innerWidth - 30, window.innerHeight / 2, 60, window.innerHeight, {
			isStatic: true,
			render: { fillStyle: 'rgba(0,0,0,1)' }
		});
		const ceiling = Bodies.rectangle(window.innerWidth / 2, 30, window.innerWidth, 60, {
			isStatic: true,
			render: { fillStyle: 'rgba(0,0,0,1)' }
		});

		World.add(world, [ground, leftWall, rightWall, ceiling]);

		// Mouse - DISABLED by default for tap priority
		const mouse = Mouse.create(render.canvas);
		const mouseConstraint = MouseConstraint.create(engine, {
			mouse: mouse,
			constraint: {
				stiffness: 0.2,
				render: { visible: false }
			}
		});

		mouseConstraint.constraint.pointA = null;
		World.add(world, mouseConstraint);

		const labels = [
			"home_basalt",
			"home_creations",
			"home_music",
			"home_community",
			"home_kaito",
			"home_news",
			"home_resume",
			"home_settings",
			"home_account"
		];


		const buttonBodies = [];

		labels.forEach((text, i) => {
			const width = 180 + Math.random() * 120;
			const height = 50;
			const centerX = window.innerWidth / 2;
			const centerY = window.innerHeight / 2;

			const body = Bodies.rectangle(
				centerX + (Math.random() - 0.5) * 200,
				centerY + (Math.random() - 0.5) * 100 - 100,
				width, height,
				{
					restitution: settings.bounce,
					friction: 1,
					velocity: {
						x: (Math.random() - 0.5) * 10,
						y: (Math.random() - 0.5) * 5
					},
					render: {
						fillStyle: '#ffffff',
					},
					label: text,
					isButton: true
				}
			);

			World.add(world, body);
			buttonBodies.push(body);
		});

		let clickStartTime = 0;
		let clickStartPos = { x: 0, y: 0 };
		let isLongPress = false;
		let longPressTimer = null;

		render.canvas.addEventListener('mousedown', (event) => {
			const bodies = Query.point(buttonBodies, mouse.position);
			const isOverButton = bodies.length > 0 && bodies[0].isButton;

			clickStartTime = Date.now();
			clickStartPos = { x: mouse.position.x, y: mouse.position.y };
			isLongPress = false;

			// Long press (500ms) enables dragging
			longPressTimer = setTimeout(() => {
				if (!isLongPress && isOverButton) {
					isLongPress = true;
					enableDragging();
				}
			}, 500);
		});

		render.canvas.addEventListener('mousemove', (event) => {
			if (clickStartTime === 0) return;

			const dx = mouse.position.x - clickStartPos.x;
			const dy = mouse.position.y - clickStartPos.y;
			const distance = Math.sqrt(dx * dx + dy * dy);

			// ⭐ Only enable drag if long press OR moved >20px (backup)
			if (!isLongPress && distance > 20) {
				isLongPress = true;
				enableDragging();
			}
		});

		render.canvas.addEventListener('mouseup', (event) => {
			const elapsed = Date.now() - clickStartTime;

			if (!isLongPress && elapsed < settings.tapThreshold) {
				const bodies = Query.point(buttonBodies, mouse.position);
				if (bodies.length > 0) {
					const body = bodies[0];
					if (body.isButton && body.label) {
						handleButtonClick(body.label);
						disableDragging(); // Reset
						clearTimeout(longPressTimer);
						return;
					}
				}
			}

			// Reset
			clearTimeout(longPressTimer);
			clickStartTime = 0;
			isLongPress = false;
			disableDragging();
		});

		function enableDragging() {
			mouseConstraint.constraint.pointA = { x: mouse.position.x, y: mouse.position.y };
		}

		function disableDragging() {
			mouseConstraint.constraint.pointA = null;
		}

		function handleButtonClick(label) {
			console.log(`Clicked: ${label}`);

			if (label === "home_settings") {
				openSettings();
			} else {
				alert(`Opening: ${label}`);
			}
		}

		// Settings functions (same as before)
		function openSettings() {
			document.getElementById('settingsOverlay').style.display = 'flex';
			document.body.style.overflow = 'hidden';
		}

		function closeSettings() {
			document.getElementById('settingsOverlay').style.display = 'none';
			document.body.style.overflow = 'hidden';
		}

		// Settings controls
		document.getElementById('gravitySlider').addEventListener('input', (e) => {
			settings.gravity = parseFloat(e.target.value);
			document.getElementById('gravityValue').textContent = settings.gravity.toFixed(1);
			engine.world.gravity.y = settings.gravity;
		});

		document.getElementById('bounceSlider').addEventListener('input', (e) => {
			settings.bounce = parseFloat(e.target.value);
			document.getElementById('bounceValue').textContent = settings.bounce.toFixed(1);
			buttonBodies.forEach(body => body.restitution = settings.bounce);
		});

		document.getElementById('glowSlider').addEventListener('input', (e) => {
			settings.glow = parseFloat(e.target.value);
			document.getElementById('glowValue').textContent = settings.glow.toFixed(1);
		});

		document.getElementById('tapSlider').addEventListener('input', (e) => {
			settings.tapThreshold = parseInt(e.target.value);
			document.getElementById('tapValue').textContent = settings.tapThreshold + 'ms';
		});

		document.getElementById('settingsOverlay').addEventListener('click', (e) => {
			if (e.target === e.currentTarget) closeSettings();
		});

		document.addEventListener('keydown', (e) => {
			if (e.key === 'Escape') closeSettings();
		});

		// Text rendering
		Events.on(render, 'afterRender', () => {
			const ctx = render.context;
			ctx.save();
			ctx.font = `bold ${14 * settings.glow}px "Chakra Petch", sans-serif`;
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';
			ctx.shadowColor = `rgba(29, 78, 216, ${0.7 * settings.glow})`;
			ctx.shadowBlur = 6 * settings.glow;

			buttonBodies.forEach(body => {
				if (body.label && body.isButton) {
					ctx.save();
					ctx.translate(body.position.x, body.position.y);
					ctx.rotate(body.angle);

					ctx.fillStyle = '#000';
					ctx.fillText(t(body.label), 0, 0);
					ctx.restore();
				}
			});
			ctx.restore();
		});



		// Resize
		window.addEventListener('resize', () => {
			Render.lookAt(render, {
				min: { x: 0, y: 0 },
				max: { x: window.innerWidth, y: window.innerHeight }
			});
			render.canvas.width = window.innerWidth;
			render.canvas.height = window.innerHeight;
			Matter.Mouse.setOffset(mouse, { x: 0, y: 0 });
		});




		let searchItems = [
			t("home_basalt"),
			t("home_creations"),
			t("home_music"),
			t("home_community"),
			t("home_kaito"),
			t("home_news"),
			t("home_resume"),
			t("home_settings"),
			t("home_account"),
		];

		const searchBox = document.getElementById("searchBox");
		const resultsBox = document.getElementById("searchResults");

		function doSearch(q = searchBox.value) {
			if (q == t("home_settings")) { openSettings(); }
		}


		searchBox.addEventListener("input", () => {
			const q = searchBox.value.toLowerCase();
			resultsBox.innerHTML = "";

			if (!q) return;

			searchItems
				.filter(item => item.toLowerCase().includes(q))
				.slice(0, 5) // limit results
				.forEach(item => {
					const div = document.createElement("div");
					div.className = "resultItem";
					div.textContent = item;

					div.onclick = () => {
						searchBox.value = item;
						resultsBox.innerHTML = "";
						doSearch(item);
					};

					resultsBox.appendChild(div);
				});
		});





	</script>
</body>

</html>
