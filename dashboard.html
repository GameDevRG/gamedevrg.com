<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account</title>

    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #3b82f6;
            font-family: "Chakra Petch", sans-serif;
            color: white;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .panel {
            width: 90%;
            max-width: 900px;
            padding: 60px;
            background: linear-gradient(145deg, #001a44, #000);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow:
                0 25px 50px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 20px;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .username {
            font-size: 48px;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 40px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 14px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .primary {
            background: #3b82f6;
            color: white;
        }

        .secondary {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }

        .danger {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.4);
            color: #f87171;
        }

        .danger:hover {
            background: rgba(239,68,68,0.3);
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-btn {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
            padding: 8px 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="top-bar">
    <button class="back-btn" onclick="goHome()">◁ back</button>
</div>

<div class="container">
    <div class="panel">

        <h1>welcome back,</h1>
        <div class="username" id="usernameDisplay">User</div>

        <div class="actions">

            <button class="primary">my profile</button>

            <button class="secondary">settings</button>

            <button class="secondary">saved data (coming soon)</button>

            <button class="danger" onclick="logout()">log out</button>

        </div>

    </div>
</div>

<script>

function goHome() {
    window.location.href = "index.html";
}

// check login state
function checkAuth() {
    const loggedIn = localStorage.getItem("loggedIn");
    const user = localStorage.getItem("username");

    if (loggedIn !== "true" || !user) {
        // not logged in → kick out
        window.location.href = "account-login.html"; // your login page
        return;
    }

    document.getElementById("usernameDisplay").textContent = user;
}

// logout
function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("username");

    window.location.href = "index.html";
}

// run on load
checkAuth();

</script>

</body>
</html>
