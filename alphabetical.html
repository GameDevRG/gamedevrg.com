<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Alphabet Keyboard Trainer</title>

	<!-- Firebase -->

	<style>
		/* General font and colors */
		body,
		h2,
		p,
		input,
		button,
		div {
			font-family: Helvetica, Arial, sans-serif;
			color: #eaeaea;
		}

		body {
			background: #0b0b0b;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			gap: 10px;
			transition: filter 0.25s ease;
		}

		body.blurred>*:not(.overlay) {
			filter: blur(6px);
		}

		#goal {
			font-size: 22px;
			letter-spacing: 3px;
		}

		#stats {
			font-size: 14px;
			opacity: 0.8;
		}

		#output {
			width: 80%;
			min-height: 60px;
			border: 2px solid #333;
			border-radius: 8px;
			padding: 12px;
			font-size: 22px;
			background: #111;
			font-family: 'courier new', monospace;
			text-align: center;
		}

		.keyboard {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.row {
			display: flex;
			gap: 8px;
		}

		.row.offset-1 {
			margin-left: 24px;
		}

		.row.offset-2 {
			margin-left: 48px;
		}

		button.key {
			width: 48px;
			height: 48px;
			background: #1a1a1a;
			border: 2px solid #2a2a2a;
			border-radius: 6px;
			cursor: pointer;
			color: transparent;
			transition: background 0.15s, border-color 0.15s;
		}

		button.key.correct {
			background: #1e8b3c;
			border-color: #1e8b3c;
		}

		button.key.wrong {
			background: #8b1e1e;
			border-color: #8b1e1e;
		}

		.controls {
			display: flex;
			gap: 12px;
			margin-top: 10px;
		}

		button.control {
			padding: 8px 18px;
			font-size: 14px;
			border-radius: 6px;
			border: none;
			cursor: pointer;
			color: #fff;
		}

		.restart {
			background: #8b1e1e;
		}

		.scores,
		.uploadScore,
		.viewLeaderboard {
			background: #1e8b3c;
		}

		.scores:hover,
		.uploadScore:hover,
		.viewLeaderboard:hover {
			background: #16a34a;
		}

		.overlay {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.5);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 10;
		}

		.overlay.active {
			display: flex;
		}

		.modal {
			background: #111;
			border: 2px solid #333;
			border-radius: 10px;
			padding: 20px;
			min-width: 300px;
			max-height: 70vh;
			overflow-y: auto;
			text-align: center;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			font-size: 13px;
		}

		th,
		td {
			border: 1px solid #333;
			padding: 6px;
			text-align: center;
		}

		th {
			background: #151515;
		}

		.close {
			margin-top: 12px;
			width: 100%;
			padding: 8px;
			border: none;
			border-radius: 6px;
			background: #333;
			color: #fff;
			cursor: pointer;
		}

		/* Login modal */
		#loginBox input {
			width: 80%;
			margin: 6px 0;
			padding: 8px;
			border-radius: 6px;
			border: 2px solid #333;
			background: #1a1a1a;
			color: #eaeaea;
		}

		#loginFeedback {
			color: red;
			font-size: 12px;
			height: 16px;
			margin-bottom: 6px;
		}
	</style>
</head>

<body>

	<div id="goal">type or click the keys in alphabetical order</div>
	<div id="stats">accuracy: 100% · time: 0.00s</div>
	<div id="output"></div>

	<div class="keyboard" id="keyboard"></div>

	<div class="controls">
		<button class="control restart" id="restart">restart</button>
		<button class="control scores" id="scores">view local scores</button>
		<button class="control uploadScore" id="uploadScore">upload highscore</button>
		<button class="control viewLeaderboard" id="viewLeaderboard">view leaderboard</button>
	</div>

	<!-- Login Modal -->
	<div class="overlay" id="loginBox">
		<div class="modal">
			<h2>Sign In</h2>
			<input id="loginUser" placeholder="Username" maxlength="16" />
			<input id="loginPassword" type="password" placeholder="Password" maxlength="32" />
			<div id="loginFeedback"></div>
			<button id="loginBtn">Sign In</button>
			<button class="close" id="closeLogin">Cancel</button>
		</div>
	</div>

	<!-- Leaderboard Modal -->
	<div class="overlay" id="leaderboardBox">
		<div class="modal">
			<h2>Leaderboard</h2>
			<table>
				<thead>
					<tr>
						<th>#</th>
						<th>User</th>
						<th>Score</th>
					</tr>
				</thead>
				<tbody id="leaderboardTable"></tbody>
			</table>
			<button class="close" id="closeLeaderboard">Close</button>
		</div>
	</div>

	<script>
		const API_URL = "https://gamedevrg-com-backend.onrender.com";

		let currentUser = localStorage.getItem("username") || null;


		// --- Keyboard trainer code ---
		const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
		let index = 0, correct = 0, wrong = 0, startTime = null, timerInterval = null;
		const history = [];
		const output = document.getElementById('output');
		const stats = document.getElementById('stats');
		const keyboard = document.getElementById('keyboard');

		function updateStats() {
			const total = correct + wrong;
			const acc = total === 0 ? 100 : Math.round((correct / total) * 100);
			const time = startTime ? ((performance.now() - startTime) / 1000).toFixed(2) : '0.00';
			stats.textContent = `accuracy: ${acc}% · time: ${time}s`;
		}
		function startTimer() { if (!startTime) { startTime = performance.now(); timerInterval = setInterval(updateStats, 50); } }
		function endRun() { clearInterval(timerInterval); const total = correct + wrong; const acc = total === 0 ? 100 : Math.round((correct / total) * 100); const time = ((performance.now() - startTime) / 1000).toFixed(2); history.push({ accuracy: acc, time }); }
		function resetGame() { index = 0; correct = 0; wrong = 0; startTime = null; clearInterval(timerInterval); output.textContent = ''; updateStats(); document.querySelectorAll('.key').forEach(k => k.classList.remove('correct', 'wrong')); }
		function pressKey(char, keyEl) { const el = keyEl || document.querySelector(`.key[data-key="${char}"]`); if (!el) return; startTimer(); if (char === alphabet[index]) { el.classList.add('correct'); output.textContent += char; index++; correct++; if (index === alphabet.length) endRun(); } else { el.classList.add('wrong'); wrong++; setTimeout(() => el.classList.remove('wrong'), 200); } updateStats(); }
		const rows = [['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'], ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'], ['z', 'x', 'c', 'v', 'b', 'n', 'm']];
		rows.forEach((rowChars, i) => { const row = document.createElement('div'); row.className = 'row'; if (i === 1) row.classList.add('offset-1'); if (i === 2) row.classList.add('offset-2'); rowChars.forEach(char => { const key = document.createElement('button'); key.className = 'key'; key.dataset.key = char; key.addEventListener('click', () => pressKey(char, key)); row.appendChild(key); }); keyboard.appendChild(row); });
		document.getElementById('restart').addEventListener('click', resetGame);

		// --- View Local Scores ---
		const localScoresBox = document.createElement('div');
		localScoresBox.className = 'overlay';
		localScoresBox.id = 'localScoresBox';
		localScoresBox.innerHTML = `
  <div class="modal">
    <h2>Local Scores</h2>
    <table>
      <thead><tr><th>#</th><th>Accuracy</th><th>Time (s)</th></tr></thead>
      <tbody id="localScoreTable"></tbody>
    </table>
    <button class="close" id="closeLocalScores">Close</button>
  </div>
`;
		document.body.appendChild(localScoresBox);

		document.getElementById('scores').onclick = () => {
			const tbody = document.getElementById('localScoreTable');
			tbody.innerHTML = '';
			history.forEach((h, i) => {
				const row = document.createElement('tr');
				row.innerHTML = `<td>${i + 1}</td><td>${h.accuracy}%</td><td>${h.time}</td>`;
				tbody.appendChild(row);
			});
			localScoresBox.classList.add('active');
			document.body.classList.add('blurred');
		};

		document.getElementById('closeLocalScores').onclick = () => {
			localScoresBox.classList.remove('active');
			document.body.classList.remove('blurred');
		};

		async function login(username, password) {
			const res = await fetch(`${API_URL}/login`, {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify({ username, password })
			});

			const data = await res.json();

			if (!res.ok) {
				alert(data.message);
				return false;
			}

			currentUser = username;
			localStorage.setItem("username", username);

			alert("Logged in as " + username);
			return true;
		}
		function getFinalTime() {
			if (!startTime) return 0;
			return (performance.now() - startTime) / 1000;
		}


		document.getElementById('uploadScore').onclick = async () => {
			if (!currentUser) {
				alert("Please log in first");
				return;
			}

			const finalTime = getFinalTime().toFixed(2);

			const res = await fetch(`${API_URL}/score`, {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify({
					username: currentUser,
					time: parseFloat(finalTime),
					leaderboard: "abcLeaderboard"
				})
			});

			const data = await res.json();
			alert(data.message);
		};



		document.getElementById('viewLeaderboard').onclick = () => {
			window.location.href = "abclead.html";
		};


		document.addEventListener('keydown', (e) => { const c = e.key.toLowerCase(); if (alphabet.includes(c)) pressKey(c, null); });
		resetGame();
	</script>
</body>

</html>
